services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /credentials/build-tridnguyen-com-0b310d33ba74.json
    volumes:
      - ./:/app
      - /app/node_modules
      - ./credentials:/credentials:ro
    command: npx nodemon src/index.js
