services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /src
    ports:
      - "3000:3000"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /credentials/build-tridnguyen-com-0b310d33ba74.json
    volumes:
      - ./:/src
      - /src/node_modules
      - ./credentials:/credentials:ro
    command: npx nodemon index.js
